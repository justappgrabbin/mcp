<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Generative Consciousness Causal Graph + MCP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #00ff88;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            grid-template-rows: auto 1fr;
            height: 100vh;
            gap: 0;
        }

        .header {
            grid-column: 1 / -1;
            background: rgba(0, 255, 136, 0.1);
            border-bottom: 2px solid #00ff88;
            padding: 15px 20px;
        }

        h1 {
            font-size: 1.8rem;
            text-shadow: 0 0 20px #00ff88;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
        }

        .graph-panel {
            position: relative;
            background: #0a0a0a;
            border-right: 2px solid #00ff88;
            overflow: hidden;
        }

        .chat-panel {
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
        }

        .chat-header {
            background: rgba(255, 0, 255, 0.1);
            padding: 12px 15px;
            border-bottom: 1px solid #ff00ff;
        }

        .chat-header h3 {
            margin: 0;
            color: #ff00ff;
            font-size: 1rem;
        }

        .chat-header .subtitle-text {
            font-size: 0.75rem;
            color: #888;
            margin-top: 5px;
        }

        .chat-iframe-container {
            flex: 1;
            position: relative;
        }

        .chat-iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #1a1a2e;
        }

        .toolbar {
            background: rgba(0, 255, 136, 0.05);
            border-bottom: 1px solid #00ff88;
            padding: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toolbar button {
            background: linear-gradient(135deg, #00ff88 0%, #00cc70 100%);
            border: none;
            color: #0a0a0a;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .toolbar button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        .toolbar button.danger {
            background: linear-gradient(135deg, #ff0066 0%, #cc0055 100%);
            color: white;
        }

        #canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .node-editor {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a2e;
            border: 2px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            z-index: 1000;
            min-width: 300px;
            display: none;
        }

        .node-editor.active {
            display: block;
        }

        .node-editor h3 {
            color: #00ff88;
            margin-bottom: 15px;
        }

        .node-editor label {
            display: block;
            color: #ffaa00;
            margin-top: 10px;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }

        .node-editor input,
        .node-editor textarea {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .node-editor textarea {
            min-height: 60px;
            resize: vertical;
        }

        .node-editor-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .node-editor-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .node-editor-buttons .save {
            background: #00ff88;
            color: #0a0a0a;
        }

        .node-editor-buttons .cancel {
            background: #ff0066;
            color: white;
        }

        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr 300px;
            }
            
            .chat-panel {
                grid-row: 4;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <h1>🧠 Generative Consciousness Causal Graph</h1>
            <div class="subtitle">Editable • Interactive • Self-Growing with MCP-Powered AI</div>
        </div>

        <!-- Graph Panel -->
        <div class="graph-panel">
            <div class="toolbar">
                <button onclick="addNode()">➕ Add Node</button>
                <button onclick="toggleConnectionMode()">🔗 Connect Mode</button>
                <button onclick="saveGraph()">💾 Save</button>
                <button onclick="loadGraph()">📂 Load</button>
                <button onclick="clearGraph()" class="danger">🗑️ Clear All</button>
                <button onclick="exportJSON()">📤 Export JSON</button>
            </div>
            <canvas id="canvas"></canvas>
        </div>

        <!-- Chat Panel with Embedded MCP Space -->
        <div class="chat-panel">
            <div class="chat-header">
                <h3>🤖 MCP-Powered AI Chat</h3>
                <div class="subtitle-text">
                    Hugging Face Inference Providers • Multiple LLMs • No Token Required
                </div>
            </div>
            <div class="chat-iframe-container">
                <iframe 
                    src="https://burtenshaw-inference-providers-mcp.hf.space" 
                    title="MCP AI Chat"
                    allow="clipboard-write"
                ></iframe>
            </div>
        </div>
    </div>

    <!-- Node Editor Modal -->
    <div class="node-editor" id="nodeEditor">
        <h3>Edit Node</h3>
        <label>Node ID:</label>
        <input type="text" id="nodeId" placeholder="e.g., gate_51">
        
        <label>Label:</label>
        <input type="text" id="nodeLabel" placeholder="e.g., Gate 51: Shock">
        
        <label>Description:</label>
        <textarea id="nodeDescription" placeholder="Causal mechanism, effects, etc."></textarea>
        
        <label>Color:</label>
        <input type="color" id="nodeColor" value="#ff00ff">
        
        <div class="node-editor-buttons">
            <button class="save" onclick="saveNode()">Save</button>
            <button class="cancel" onclick="closeNodeEditor()">Cancel</button>
        </div>
    </div>

    <script>
        // ============================================
        // CAUSAL GRAPH DATA STRUCTURE
        // ============================================

        let graph = {
            nodes: [],
            edges: [],
            metadata: {
                created: new Date().toISOString(),
                version: "2.0-MCP"
            }
        };

        let canvas, ctx;
        let selectedNode = null;
        let draggingNode = null;
        let connectionMode = false;
        let connectionStart = null;
        let mousePos = {x: 0, y: 0};

        // ============================================
        // CANVAS SETUP
        // ============================================

        function initCanvas() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
            canvas.addEventListener('dblclick', handleDoubleClick);
            
            const saved = localStorage.getItem('consciousnessGraph');
            if (saved) {
                graph = JSON.parse(saved);
            } else {
                createStarterGraph();
            }
            
            render();
        }

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        function createStarterGraph() {
            graph.nodes = [
                {id: 'birth', label: 'Birth Moment', x: 150, y: 100, color: '#00ff88', description: 'Time & place of birth'},
                {id: 'planets', label: 'Planetary Positions', x: 150, y: 250, color: '#00ffff', description: 'Celestial coordinates'},
                {id: 'gates', label: 'Gate Activations', x: 150, y: 400, color: '#ff00ff', description: '64 possible gates'},
                {id: 'dna', label: 'DNA Expression', x: 400, y: 400, color: '#ffaa00', description: 'Codon activation'}
            ];
            
            graph.edges = [
                {from: 'birth', to: 'planets', label: 'determines'},
                {from: 'planets', to: 'gates', label: 'activates'},
                {from: 'gates', to: 'dna', label: 'triggers'}
            ];
        }

        // ============================================
        // RENDERING
        // ============================================

        function render() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            graph.edges.forEach(edge => drawEdge(edge));
            graph.nodes.forEach(node => drawNode(node));
            
            if (connectionMode && connectionStart) {
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(connectionStart.x, connectionStart.y);
                ctx.lineTo(mousePos.x, mousePos.y);
                ctx.stroke();
                ctx.setLineDash([]);
            }
            
            requestAnimationFrame(render);
        }

        function drawNode(node) {
            const radius = 40;
            const isSelected = selectedNode === node;
            
            ctx.fillStyle = node.color || '#ff00ff';
            ctx.strokeStyle = isSelected ? '#ffff00' : '#ffffff';
            ctx.lineWidth = isSelected ? 3 : 2;
            
            ctx.beginPath();
            ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const words = node.label.split(' ');
            let line = '';
            let y = node.y - 10;
            
            words.forEach((word, i) => {
                const testLine = line + word + ' ';
                const metrics = ctx.measureText(testLine);
                
                if (metrics.width > radius * 1.5 && i > 0) {
                    ctx.fillText(line, node.x, y);
                    line = word + ' ';
                    y += 15;
                } else {
                    line = testLine;
                }
            });
            ctx.fillText(line, node.x, y);
        }

        function drawEdge(edge) {
            const fromNode = graph.nodes.find(n => n.id === edge.from);
            const toNode = graph.nodes.find(n => n.id === edge.to);
            
            if (!fromNode || !toNode) return;
            
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(fromNode.x, fromNode.y);
            ctx.lineTo(toNode.x, toNode.y);
            ctx.stroke();
            
            const angle = Math.atan2(toNode.y - fromNode.y, toNode.x - fromNode.x);
            const arrowLength = 15;
            
            ctx.beginPath();
            ctx.moveTo(toNode.x, toNode.y);
            ctx.lineTo(
                toNode.x - arrowLength * Math.cos(angle - Math.PI / 6),
                toNode.y - arrowLength * Math.sin(angle - Math.PI / 6)
            );
            ctx.moveTo(toNode.x, toNode.y);
            ctx.lineTo(
                toNode.x - arrowLength * Math.cos(angle + Math.PI / 6),
                toNode.y - arrowLength * Math.sin(angle + Math.PI / 6)
            );
            ctx.stroke();
            
            if (edge.label) {
                const midX = (fromNode.x + toNode.x) / 2;
                const midY = (fromNode.y + toNode.y) / 2;
                
                ctx.fillStyle = '#ffaa00';
                ctx.font = '10px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(edge.label, midX, midY - 10);
            }
        }

        // ============================================
        // MOUSE INTERACTION
        // ============================================

        function handleMouseDown(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const node = getNodeAtPosition(x, y);
            
            if (connectionMode && node) {
                if (!connectionStart) {
                    connectionStart = node;
                } else {
                    graph.edges.push({
                        from: connectionStart.id,
                        to: node.id,
                        label: 'causes'
                    });
                    connectionStart = null;
                    connectionMode = false;
                    saveToStorage();
                }
            } else if (node) {
                draggingNode = node;
                selectedNode = node;
            } else {
                selectedNode = null;
            }
        }

        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            mousePos.x = e.clientX - rect.left;
            mousePos.y = e.clientY - rect.top;
            
            if (draggingNode) {
                draggingNode.x = mousePos.x;
                draggingNode.y = mousePos.y;
            }
        }

        function handleMouseUp(e) {
            if (draggingNode) {
                saveToStorage();
            }
            draggingNode = null;
        }

        function handleDoubleClick(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const node = getNodeAtPosition(x, y);
            if (node) {
                openNodeEditor(node);
            }
        }

        function getNodeAtPosition(x, y) {
            for (let node of graph.nodes) {
                const dx = x - node.x;
                const dy = y - node.y;
                if (Math.sqrt(dx * dx + dy * dy) < 40) {
                    return node;
                }
            }
            return null;
        }

        // ============================================
        // GRAPH OPERATIONS
        // ============================================

        function addNode() {
            const id = prompt("Node ID (e.g., gate_51):");
            if (!id) return;
            
            const label = prompt("Node Label (e.g., Gate 51: Shock):");
            if (!label) return;
            
            graph.nodes.push({
                id: id,
                label: label,
                x: 300,
                y: 300,
                color: '#ff00ff',
                description: ''
            });
            
            saveToStorage();
        }

        function toggleConnectionMode() {
            connectionMode = !connectionMode;
            connectionStart = null;
            
            canvas.style.cursor = connectionMode ? 'pointer' : 'crosshair';
        }

        function clearGraph() {
            if (confirm("Clear entire graph? This cannot be undone!")) {
                graph = {nodes: [], edges: [], metadata: {created: new Date().toISOString(), version: "2.0-MCP"}};
                localStorage.removeItem('consciousnessGraph');
            }
        }

        function saveGraph() {
            saveToStorage();
            alert("Graph saved!");
        }

        function loadGraph() {
            const saved = localStorage.getItem('consciousnessGraph');
            if (saved) {
                graph = JSON.parse(saved);
                alert("Graph loaded!");
            } else {
                alert("No saved graph found");
            }
        }

        function exportJSON() {
            const json = JSON.stringify(graph, null, 2);
            const blob = new Blob([json], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'consciousness_causal_graph.json';
            a.click();
        }

        function saveToStorage() {
            localStorage.setItem('consciousnessGraph', JSON.stringify(graph));
        }

        // ============================================
        // NODE EDITOR
        // ============================================

        function openNodeEditor(node) {
            document.getElementById('nodeId').value = node.id;
            document.getElementById('nodeLabel').value = node.label;
            document.getElementById('nodeDescription').value = node.description || '';
            document.getElementById('nodeColor').value = node.color || '#ff00ff';
            document.getElementById('nodeEditor').classList.add('active');
            selectedNode = node;
        }

        function closeNodeEditor() {
            document.getElementById('nodeEditor').classList.remove('active');
        }

        function saveNode() {
            if (selectedNode) {
                selectedNode.id = document.getElementById('nodeId').value;
                selectedNode.label = document.getElementById('nodeLabel').value;
                selectedNode.description = document.getElementById('nodeDescription').value;
                selectedNode.color = document.getElementById('nodeColor').value;
                
                saveToStorage();
            }
            closeNodeEditor();
        }

        // ============================================
        // INITIALIZATION
        // ============================================

        window.addEventListener('DOMContentLoaded', () => {
            initCanvas();
        });
    </script>
</body>
</html>
